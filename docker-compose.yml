version: "3.9"

services:
  api:
    build: .
    container_name: prguard-api
    environment:
      - OPENAI_API_KEY=${OPENAI_API_KEY}
      - GITHUB_TOKEN=${GITHUB_TOKEN}
      - GITHUB_WEBHOOK_SECRET=${GITHUB_WEBHOOK_SECRET}
      - REDIS_URL=redis://redis:6379/0
      - CHROMA_PERSIST_DIR=/app/.chroma
    ports:
      - "8000:8000"
    depends_on:
      - redis

  worker:
    build: .
    container_name: prguard-worker
    command: celery -A queue.task_queue.celery_app worker --loglevel=INFO --concurrency=1
    environment:
      - OPENAI_API_KEY=${OPENAI_API_KEY}
      - GITHUB_TOKEN=${GITHUB_TOKEN}
      - GITHUB_WEBHOOK_SECRET=${GITHUB_WEBHOOK_SECRET}
      - REDIS_URL=redis://redis:6379/0
      - CHROMA_PERSIST_DIR=/app/.chroma
    depends_on:
      - redis

  redis:
    image: redis:7
    container_name: prguard-redis
    ports:
      - "6379:6379"

